name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build gcc-14 g++-14 ccache

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Select GCC 14
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          gcc --version
          g++ --version

      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSLEVEL=6" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV
          ccache --set-config=compiler_check=content
          ccache --show-config
          ccache --zero-stats

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-gcc14-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'conanfile.txt') }}
          restore-keys: |
            ccache-${{ runner.os }}-gcc14-

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-gcc14-debug-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-gcc14-debug-
            conan-${{ runner.os }}-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan cmake

      - name: Configure Conan
        run: conan profile detect --force

      - name: Enable ccache for builds
        run: |
          echo "CC=ccache gcc-14" >> $GITHUB_ENV
          echo "CXX=ccache g++-14" >> $GITHUB_ENV

      - name: Install dependencies (Conan)
        run: conan install . -s build_type=Debug -b missing

      - name: Verify prerequisites
        run: |
          echo "Ninja: $(command -v ninja || true)"
          test -x "$(command -v ninja)"
          ls -la build/Debug || true
          ls -la build/Debug/generators || true
          test -f build/Debug/generators/conan_toolchain.cmake

      - name: Configure (CMake)
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: ctest --test-dir build/Debug --output-on-failure

      - name: ccache stats
        run: ccache --show-stats --verbose
