name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan cmake

      - name: Configure Conan
        run: conan profile detect --force

      - name: Install dependencies (Conan)
        run: conan install . -s build_type=Debug -of build/Debug -b missing

      - name: Configure (CMake)
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: ctest --test-dir build/Debug --output-on-failure
